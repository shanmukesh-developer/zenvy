services:
  # 1. Backend API
  - type: web
    name: hostelbites-backend
    env: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hostelbites-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: NODE_ENV
        value: production

databases:
  - name: hostelbites-db
    databaseName: hostelbites
    user: admin

services:
  # 2. Customer Frontend
  - type: web
    name: hostelbites-customer
    env: node
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npx -y serve@latest out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend.onrender.com

  # 3. Delivery App
  - type: web
    name: hostelbites-delivery
    env: node
    plan: free
    rootDir: delivery-app
    buildCommand: npm install && npm run build
    startCommand: npx -y serve@latest out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend.onrender.com

  # 4. Admin Dashboard
  - type: web
    name: hostelbites-admin
    env: node
    plan: free
    rootDir: admin-dashboard
    buildCommand: npm install && npm run build
    startCommand: npx -y serve@latest out
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://hostelbites-backend.onrender.com
